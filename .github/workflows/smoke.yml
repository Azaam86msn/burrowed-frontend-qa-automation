# .github/workflows/smoke.yml
#
# PURPOSE — two modes, one workflow:
#
#   MODE 1 · INTERNAL  (push / pull_request inside THIS QA repo)
#     Triggered automatically on every push and every PR.
#     Checks out the current branch so WIP test changes are validated.
#
#   MODE 2 · EXTERNAL  (workflow_call from mhdatheek136/woodtech-frontend)
#     Triggered by the frontend repo's qa-smoke.yml on every PR to main.
#     Checks out THIS QA repo at main and tests https://burrowed.org.
#     Status check "QA Smoke Gate / Smoke Tests (Chrome)" appears on the
#     frontend PR and blocks merge when branch protection is configured.
#
# ARTIFACTS  Allure results, screenshots (failure only), videos — 7 days.
#
# SECRETS (QA repo → Settings → Secrets → Actions → Repository secrets)
#   CYPRESS_BASE_URL   https://burrowed.org
#   API_BASE_URL       https://burrowed-magazine-api.onrender.com/api

name: "🚀 Smoke Tests — Quality Gate"

on:
  # ── Internal triggers (QA repo) ─────────────────────────────────────────
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
    types:
      - opened
      - synchronize   # new commits pushed to an existing PR
      - reopened
      - ready_for_review  # draft PR marked as ready

  # ── External trigger (called by frontend repo) ──────────────────────────
  # No inputs or secrets required — tests target the public production URL.
  workflow_call:

# Cancel stale runs when new commits arrive on the same branch/PR.
concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: "Smoke Tests (Chrome)"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      #
      # Only ONE of the two steps below runs per trigger:
      #
      # INTERNAL  Standard checkout on the current branch. Feature branches
      #           and draft PRs test their own WIP code, not stale main.
      #
      # EXTERNAL  Must explicitly name the QA repo + ref=main because the
      #           default checkout would pull the FRONTEND repo's code, which
      #           has no Cypress tests.

      - name: "⬇️  Checkout (QA repo — internal)"
        if: github.event_name != 'workflow_call'
        uses: actions/checkout@v4

      - name: "⬇️  Checkout QA repo @ main (called from frontend)"
        if: github.event_name == 'workflow_call'
        uses: actions/checkout@v4
        with:
          repository: Azaam86msn/burrowed-frontend-qa-automation
          ref: main
          # QA repo is public — no token needed

      # ── Setup ─────────────────────────────────────────────────────────────

      - name: "📦 Setup pnpm"
        uses: pnpm/action-setup@v4

      - name: "🟢 Setup Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: "☕ Setup Java 17 (Allure CLI)"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: "📥 Install dependencies"
        run: pnpm install --frozen-lockfile

      # ── Test run ──────────────────────────────────────────────────────────

      - name: "🧪 Run smoke tests"
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: pnpm cypress:smoke
          browser: chrome
        env:
          # Fallback values make this work even without secrets configured,
          # e.g. when called from the public frontend repo with no secrets.
          CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL || 'https://burrowed.org' }}
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'https://burrowed-magazine-api.onrender.com/api' }}

      # ── Reporting ─────────────────────────────────────────────────────────

      - name: "📊 Generate Allure report"
        if: always()
        run: pnpm allure:generate

      - name: "📤 Upload Allure results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "smoke-allure-results-${{ github.run_number }}"
          path: allure-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: "🖼️  Upload screenshots (failure only)"
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "smoke-screenshots-${{ github.run_number }}"
          path: cypress/screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: "🎬 Upload videos"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "smoke-videos-${{ github.run_number }}"
          path: cypress/videos/
          retention-days: 7
          if-no-files-found: ignore