# docker/docker-compose.yml
#
# Starts WireMock ONLY — useful when you want to run Cypress tests via the
# CLI (pnpm cypress:run) but need the subscribe/collaborate API stubbed.
#
# Run from the PROJECT ROOT:
#   docker compose -f docker/docker-compose.yml up -d
#
# Or via the package.json shortcut:
#   pnpm docker:wm
#
# WireMock will be available at http://localhost:8080.
# The subscribe stub mapping is already configured in ./wiremock/mappings/.
services:
  wiremock:
    image: wiremock/wiremock:3.5.4-1
    container_name: burrowed-wiremock-dev
    ports:
      - "8080:8080"
    # Path is relative to the docker/ directory, so ../docker/wiremock → ./wiremock
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/__admin/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
